name = "probability_character"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["ProbabilityCharacter"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.1"

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

[[lean_lib]]
name = "ProbabilityCharacter"
srcDir = "blueprint"
