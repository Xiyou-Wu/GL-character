name: Compile blueprint

on:
  push:
    branches:
      - main
    paths-ignore:
      - "home_page/**"
      - ".github/workflows/**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_project:
    runs-on: ubuntu-latest
    name: Build project and blueprint
    steps:
      - name: Cleanup to free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Checkout project
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0

      - name: Install elan
        run: curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y

      - name: Get Mathlib cache
        run: ~/.elan/bin/lake exe cache get || true

      - name: Cache Lake build artifacts
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: |
            .lake/build
            !.lake/build/doc-data
          key: LakeBuild-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}

      - name: Build Lean project
        run: ~/.elan/bin/lake build ProbabilityCharacter

      - name: Compile blueprint and documentation
        if: github.event_name != 'pull_request'
        uses: leanprover-community/docgen-action@7b5b9a1822650bd45aaeb4182d94bceba2030f89
        with:
          blueprint: true
          homepage: home_page
